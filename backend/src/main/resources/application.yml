server:
  port: 8080
  error:
    # So API clients see the real cause (e.g. OpenAI 401) instead of only "Internal Server Error"
    include-message: always
    include-binding-errors: always

# Logs: console + rolling file under ./logs/ (when running the JAR or `mvn spring-boot:run` from backend/)
logging:
  level:
    root: INFO
    com.dietbuilder: INFO
    org.springframework.web: WARN
    org.springframework.security: WARN
  file:
    name: ${LOG_FILE:logs/dietbuilder.log}
  logback:
    rollingpolicy:
      max-file-size: 20MB
      max-history: 14
      total-size-cap: 1GB
  pattern:
    console: "%d{yyyy-MM-dd'T'HH:mm:ss.SSS} [%thread] %-5level %logger{36} [requestId=%X{requestId:-}] - %msg%n"
    file: "%d{yyyy-MM-dd'T'HH:mm:ss.SSS} [%thread] %-5level %logger{36} [requestId=%X{requestId:-}] - %msg%n"

spring:
  data:
    mongodb:
      uri: ${MONGODB_URI:mongodb://localhost:27017/dietbuilder}
      database: dietbuilder

openai:
  api:
    key: ${OPENAI_API_KEY:}
    model: ${OPENAI_MODEL:gpt-4o}
    # Upper bound; effective tokens per request are min(this, a day-scaled cap) to avoid oversized completions for short plans
    max-tokens: ${OPENAI_MAX_TOKENS:16384}
  plan:
    # 0 = one API call for the full plan. >0 splits into segments of at most this many days (parallel requests; cross-chunk variety is prompt-only)
    chunk-days: ${OPENAI_PLAN_CHUNK_DAYS:0}
    chunk-parallelism: ${OPENAI_PLAN_CHUNK_PARALLELISM:4}
    # Truncate long expert source summaries in the user message to save prompt tokens
    evidence-summary-max-chars: ${OPENAI_PLAN_EVIDENCE_SUMMARY_MAX_CHARS:400}

usda:
  api:
    key: ${USDA_API_KEY:}

rag:
  embedding:
    model: ${RAG_EMBEDDING_MODEL:text-embedding-3-small}
    dimensions: ${RAG_EMBEDDING_DIMENSIONS:1536}
    # Parallel OpenAI embedding calls when backfilling missing source vectors (bounded)
    backfill-concurrency: ${RAG_EMBEDDING_BACKFILL_CONCURRENCY:4}
  retrieval:
    top-k: ${RAG_TOP_K:15}
    min-relevance-threshold: ${RAG_MIN_RELEVANCE_THRESHOLD:0.3}
    cache-ttl-minutes: ${RAG_CACHE_TTL_MINUTES:60}
  ranking:
    credibility-weight: ${RAG_CREDIBILITY_WEIGHT:0.4}
    recency-weight: ${RAG_RECENCY_WEIGHT:0.2}
    relevance-weight: ${RAG_RELEVANCE_WEIGHT:0.3}
    specificity-weight: ${RAG_SPECIFICITY_WEIGHT:0.1}
    recency-half-life-years: ${RAG_RECENCY_HALF_LIFE_YEARS:5}
  scheduler:
    verify-cron: ${RAG_VERIFY_CRON:0 0 3 * * SUN}
    cache-cleanup-cron: ${RAG_CACHE_CLEANUP_CRON:0 0 */6 * * *}
    health-cron: ${RAG_HEALTH_CRON:0 0 8 * * *}
    source-stale-years: ${RAG_SOURCE_STALE_YEARS:7}
